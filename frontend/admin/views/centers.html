<section id="view-centers" class="view hidden"><div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h1 class="text-2xl font-bold">Evacuation centers</h1><p class="text-sm text-slate-500">View center locations, status, capacity, and contact details.</p></div><div class="flex gap-2"><button id="nearestCenterBtn" class="rounded-lg border bg-white px-4 py-2.5 text-sm font-semibold">Find nearest</button><button id="newCenterBtn" class="manager-only rounded-lg bg-violet-600 px-4 py-2.5 text-sm font-semibold text-white">Add center</button></div></div><div class="mt-5 grid gap-5 xl:grid-cols-3"><div class="overflow-hidden rounded-2xl border bg-white xl:col-span-2"><div id="centerMap" class="h-[500px]"></div></div><aside id="centerFormCard" class="manager-only hidden rounded-2xl border bg-white p-5"><form id="centerForm" class="space-y-3"><input name="id" type="hidden"><h2 id="centerFormTitle" class="font-semibold">Add evacuation center</h2><input name="center_name" required minlength="2" maxlength="180" placeholder="Center name" class="w-full rounded-lg border p-2.5"><select name="municipality_id" class="w-full rounded-lg border p-2.5"><option value="">Select municipality</option></select><input name="address" required maxlength="255" placeholder="Address" class="w-full rounded-lg border p-2.5"><input name="contact_person" maxlength="120" placeholder="Contact person" class="w-full rounded-lg border p-2.5"><input name="contact_number" maxlength="30" placeholder="Contact number" class="w-full rounded-lg border p-2.5"><input name="capacity" type="number" min="0" required placeholder="Capacity" class="w-full rounded-lg border p-2.5"><select name="status" required class="w-full rounded-lg border p-2.5"><option value="available">Available</option><option value="full">Full</option><option value="closed">Closed</option><option value="under_maintenance">Under maintenance</option></select><div class="grid grid-cols-2 gap-2"><input name="latitude" type="number" step="any" required placeholder="Latitude" class="w-full rounded-lg border p-2.5"><input name="longitude" type="number" step="any" required placeholder="Longitude" class="w-full rounded-lg border p-2.5"></div><p id="centerFormError" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-700"></p><button class="w-full rounded-lg bg-violet-600 p-2.5 font-semibold text-white">Save center</button></form></aside></div><div class="mt-5 overflow-x-auto rounded-2xl border bg-white"><table class="w-full text-left text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-4">Center</th><th class="p-4">Municipality</th><th class="p-4">Status</th><th class="p-4">Capacity</th><th class="p-4">Contact</th><th class="p-4 text-right">Actions</th></tr></thead><tbody id="centersTable"></tbody></table></div></section>
