<section id="view-profile" class="view hidden"><h1 class="text-2xl font-bold">Profile & security</h1><div class="mt-5 grid gap-5 xl:grid-cols-2"><form id="profileForm" class="space-y-4 rounded-2xl border bg-white p-6"><h2 class="font-semibold">Profile details</h2><input name="fullname" required placeholder="Full name" class="w-full rounded-lg border p-3"><input name="email" type="email" required placeholder="Email" class="w-full rounded-lg border p-3"><input name="phone" placeholder="Phone" class="w-full rounded-lg border p-3"><input name="address" placeholder="Address" class="w-full rounded-lg border p-3"><input name="municipality_id" type="number" min="1" placeholder="Municipality ID" class="w-full rounded-lg border p-3"><input name="barangay" placeholder="Barangay" class="w-full rounded-lg border p-3"><button class="rounded-lg bg-indigo-600 px-5 py-3 font-semibold text-white">Update profile</button></form><form id="passwordForm" class="space-y-4 rounded-2xl border bg-white p-6"><h2 class="font-semibold">Change password</h2><input name="current_password" type="password" required placeholder="Current password" class="w-full rounded-lg border p-3"><input name="password" type="password" minlength="8" required placeholder="New password" class="w-full rounded-lg border p-3"><input name="password_confirmation" type="password" minlength="8" required placeholder="Confirm new password" class="w-full rounded-lg border p-3"><button class="rounded-lg bg-slate-900 px-5 py-3 font-semibold text-white">Change password</button></form></div></section>
