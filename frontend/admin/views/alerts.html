<section id="view-alerts" class="view hidden"><div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h1 class="text-2xl font-bold">Alerts and notifications</h1><p class="text-sm text-slate-500">Emergency advisories and historical notifications.</p></div><div class="flex gap-2"><button id="newAlertBtn" class="manager-only rounded-lg bg-red-600 px-4 py-2.5 text-sm font-semibold text-white">Create alert</button></div></div><div class="mt-5 grid gap-5 xl:grid-cols-3"><div class="alerts-table-card overflow-x-auto rounded-2xl border bg-white xl:col-span-2"><table class="alerts-table w-full text-left text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-4">Alert</th><th class="p-4">Type</th><th class="p-4">Level</th><th class="p-4">Municipality</th><th class="p-4">Status</th><th class="p-4 text-right">Actions</th></tr></thead><tbody id="alertsTable"></tbody></table></div><aside id="alertFormCard" class="manager-only hidden rounded-2xl border bg-white p-5"><form id="alertForm" class="space-y-3"><input name="id" type="hidden"><h2 id="alertFormTitle" class="font-semibold">Create alert</h2><input name="title" required minlength="3" maxlength="180" placeholder="Alert title" class="w-full rounded-lg border p-3"><select name="alert_type" required class="w-full rounded-lg border p-3"><option value="weather_alert">Weather Alert</option><option value="flood_alert">Flood Alert</option><option value="earthquake_alert">Earthquake Alert</option><option value="storm_surge_alert">Storm Surge Alert</option><option value="emergency_alert">Emergency Alert</option></select><select name="alert_level" required class="w-full rounded-lg border p-3"><option value="info">Information</option><option value="advisory">Advisory</option><option value="warning">Warning</option><option value="critical">Critical</option></select><select name="municipality_id" class="w-full rounded-lg border p-3"><option value="">Province-wide</option></select><textarea name="message" required minlength="5" maxlength="10000" placeholder="Alert message" rows="6" class="w-full rounded-lg border p-3"></textarea><p id="alertFormError" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-700"></p><button class="w-full rounded-lg bg-slate-900 p-3 font-semibold text-white">Save draft</button></form></aside></div></section>
