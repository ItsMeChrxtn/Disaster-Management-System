<section id="view-users" class="view hidden"><div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h1 class="text-2xl font-bold">Users</h1><p id="usersScopeText" class="text-sm text-slate-500">Manage system accounts.</p></div><button id="addUserBtn" class="admin-only rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white">Create user</button></div><div class="mt-5 grid gap-5 xl:grid-cols-3"><div class="users-table-card overflow-x-auto rounded-2xl border bg-white xl:col-span-2"><table class="users-table w-full text-left text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-4">Name</th><th class="p-4">Role</th><th class="p-4">Municipality</th><th class="p-4">Status</th><th class="p-4 text-right">Actions</th></tr></thead><tbody id="usersTable"></tbody></table></div><aside id="userPanel" class="hidden rounded-2xl border bg-white p-5"><div class="flex items-center justify-between"><h2 id="userPanelTitle" class="font-semibold">Create user</h2><button id="closeUserPanel" type="button" class="text-slate-400">x</button></div><div id="userDetails" class="mt-4 hidden space-y-3 text-sm"></div><form id="userForm" class="mt-4 space-y-3"><input name="id" type="hidden"><input name="fullname" minlength="2" maxlength="150" required placeholder="Full name" class="w-full rounded-lg border p-3"><input name="email" type="email" required placeholder="Email" class="w-full rounded-lg border p-3"><input name="phone" placeholder="Phone" class="w-full rounded-lg border p-3"><input name="address" placeholder="Address" class="w-full rounded-lg border p-3"><select name="municipality_id" class="w-full rounded-lg border p-3"><option value="">No municipality</option></select><input name="barangay" placeholder="Barangay" class="w-full rounded-lg border p-3"><select name="role" required class="w-full rounded-lg border p-3"><option value="resident">Resident</option><option value="subadmin">Sub Admin</option><option value="admin">Admin</option></select><input name="password" type="password" minlength="8" placeholder="Password" class="w-full rounded-lg border p-3"><p class="text-xs text-slate-500">Leave password blank while editing to keep it unchanged.</p><p id="userFormError" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-700"></p><button class="w-full rounded-lg bg-indigo-600 p-3 font-semibold text-white">Save user</button></form></aside></div></section>
