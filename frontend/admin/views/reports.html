<section id="view-reports" class="view hidden"><div><h1 class="text-2xl font-bold">Report generation</h1><p class="text-sm text-slate-500">Generate municipality-scoped operational reports in PDF or Excel format.</p></div><div class="mt-5 grid gap-5 xl:grid-cols-3"><form id="reportForm" class="space-y-4 rounded-2xl border bg-white p-6"><h2 class="font-semibold">New report</h2><label class="block text-sm font-medium">Report type<select name="report_type" required class="mt-1 w-full rounded-lg border p-3"><option value="hazard">Hazard Report</option><option value="alert">Alert Report</option><option value="historical_disaster">Historical Disaster Report</option></select></label><label class="block text-sm font-medium">Export format<select name="format" required class="mt-1 w-full rounded-lg border p-3"><option value="pdf">PDF</option><option value="xlsx">Excel (.xlsx)</option></select></label><div class="grid grid-cols-2 gap-3"><label class="block text-sm font-medium">From<input name="date_from" type="date" class="mt-1 w-full rounded-lg border p-3"></label><label class="block text-sm font-medium">To<input name="date_to" type="date" class="mt-1 w-full rounded-lg border p-3"></label></div><p id="reportFormError" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-700"></p><button class="w-full rounded-lg bg-indigo-600 p-3 font-semibold text-white">Generate report</button></form><div class="overflow-x-auto rounded-2xl border bg-white xl:col-span-2"><table class="w-full text-left text-sm"><thead class="bg-slate-50 text-slate-500"><tr><th class="p-4">Report</th><th class="p-4">Format</th><th class="p-4">Generated by</th><th class="p-4">Generated</th><th class="p-4 text-right">Action</th></tr></thead><tbody id="reportsTable"></tbody></table></div></div></section>
